id: dev.neoapps.LegacyLauncher
runtime: org.kde.Platform
runtime-version: "6.7"
sdk: org.kde.Sdk//6.7
command: legacy-launcher
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --filesystem=xdg-data/Steam:ro
  - --filesystem=~/.steam:ro
  - --filesystem=~/.var/app/com.valvesoftware.Steam:ro
  - --talk-name=org.freedesktop.Flatpak
  - --env=STEAM_COMPAT_CLIENT_INSTALL_PATH=/run/host/home/.steam/steam
  - --own-name=org.freedesktop.*
  - --talk-name=org.freedesktop.*

modules:
  - name: legacy-launcher
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: ..
    post-install:
      - install -Dm644 packaging/legacy-launcher.desktop /app/share/applications/dev.neoapps.LegacyLauncher.desktop
      - install -Dm644 packaging/icon.png /app/share/icons/hicolor/256x256/apps/dev.neoapps.LegacyLauncher.png
      - install -Dm644 packaging/dev.neoapps.LegacyLauncher.metainfo.xml /app/share/metainfo/dev.neoapps.LegacyLauncher.metainfo.xml
